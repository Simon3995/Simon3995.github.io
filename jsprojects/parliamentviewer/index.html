<!DOCTYPE html>
<html>

<head>
    <title>Parliament Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Full-screen canvas -->
    <canvas width="800" height="400" id="canvas"></canvas>

    <!-- Top left logo/menu -->
    <div id="logo">
        <h1>Parliament Viewer</h1>

        <select id="select-timeline" autocomplete="off">
            <option value="be_federalparliament">Belgium - Federaal Parlement/Parlement Fédéral</option>
            <option value="dk_folketing">Denmark - Folketing</option>
            <option value="de_bundestag">Germany - Bundestag</option>
            <option value="eu_parliament">European Union - European Parliament</option>
            <option value="fi_eduskunta">Finland - Eduskunta</option>
            <option value="nl_eerstekamer">Netherlands - Eerste Kamer</option>
            <option value="nl_tweedekamer" selected>Netherlands - Tweede Kamer</option>
            <option value="no_storting">Norway - Storting</option>
            <option value="se_riksdag">Sweden - Riksdag</option>
            <option value="us_houseofrepresentatives">United States - House of Representatives</option>
            <option value="us_senate">United States - Senate</option>
        </select>
    </div>

    <!-- Right sidebar -->
    <div id="sidebar">
        <button onclick="prev()">Previous</button><button onclick="next()" class="rbutton">Next</button>
        <h1 id="title"></h1>
        <div id="table"></div>
        <div id="left_plm"></div>
        <div id="links">
            View this project on <a target="#" href="https://github.com/Simon3995/ParliamentViewer">GitHub</a>
        </div>
    </div>

    <!-- temporary, debugging -->
    <div id="offscreen"></div>
</body>

</html>

<!-- Scripts -->
<script src="geometry.js"></script>

<script src="Party.js"></script>
<script src="Fraction.js"></script>
<script src="Parliament.js"></script>
<script src="Timeline.js"></script>

<script src="timelines/00_init.js"></script>
<script src="timelines/be_federalparliament.js"></script>
<script src="timelines/de_bundestag.js"></script>
<script src="timelines/dk_folketing.js"></script>
<script src="timelines/eu_parliament.js"></script>
<script src="timelines/fi_eduskunta.js"></script>
<script src="timelines/nl_eerstekamer.js"></script>
<script src="timelines/nl_tweedekamer.js"></script>
<script src="timelines/no_storting.js"></script>
<script src="timelines/se_riksdag.js"></script>
<script src="timelines/us_houseofrepresentatives.js"></script>
<script src="timelines/us_senate.js"></script>

<script src="main.js"></script>
